<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEOCRAFT 소개</title>
    <style>
        body { margin: 0; padding: 0; background-image: url('https://launcher.mojang.com/v1/objects/a740702d847990da9836365a6e60b296f014897a/background.jpg'); background-size: cover; background-position: center; background-attachment: fixed; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .launcher-panel { background-color: rgba(30, 30, 30, 0.95); width: 850px; height: 600px; border-radius: 8px; border: 2px solid #555; box-shadow: 0 10px 30px rgba(0,0,0,0.7); display: flex; flex-direction: column; overflow: hidden; }
        .tab-bar { background-color: #2a2a2a; padding: 15px 25px; display: flex; gap: 30px; border-bottom: 2px solid #444; }
        .tab { font-weight: bold; color: #aaa; cursor: pointer; font-size: 18px; transition: 0.2s; padding-bottom: 5px; }
        .tab.active { color: white; border-bottom: 3px solid #36ff36; }
        .content-area { flex-grow: 1; overflow-y: auto; padding: 30px; display: none; }
        .content-area.active { display: block; }
        .intro-content { text-align: center; }
        h1 { font-size: 56px; margin: 10px 0; text-shadow: 3px 3px 5px rgba(0,0,0,0.9); user-select: none; }
        .server-status { font-weight: bold; font-size: 20px; margin-bottom: 30px; transition: 0.3s; }
        .address-group { display: flex; flex-direction: column; gap: 12px; align-items: center; }
        .address-btn { background-color: #3c3c3c; border: 1px solid #555; padding: 12px 20px; border-radius: 4px; width: 450px; display: flex; justify-content: space-between; text-decoration: none; color: white; }
        .addr-val { color: #36ff36; font-family: monospace; font-weight: bold; }
        .play-bar { background-color: #2a2a2a; padding: 20px; display: flex; justify-content: center; border-top: 2px solid #444; }
        .play-btn { background-color: #36ff36; color: black; font-size: 26px; font-weight: bold; padding: 12px 80px; border: none; border-radius: 4px; cursor: pointer; }

        /* 섭장 전용 비밀 제어실 🛫🐉💵 */
        #admin-panel { display: none; position: fixed; top: 20px; right: 20px; background: #1e1e1e; padding: 20px; border-radius: 12px; border: 2px solid #36ff36; z-index: 9999; width: 220px; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
        .admin-btn { width: 100%; margin-bottom: 8px; padding: 10px; background: #333; color: white; border: 1px solid #555; border-radius: 4px; cursor: pointer; font-size: 14px; }
        .admin-btn:hover { background: #444; border-color: #36ff36; }
    </style>
</head>
<body>
    <div id="admin-panel">
        <strong style="color:#36ff36; display:block; text-align:center; margin-bottom:15px;">섭장 제어실</strong>
        <button class="admin-btn" onclick="setManual('auto')">🔄 실시간 자동모드</button>
        <button class="admin-btn" onclick="setManual('on')">🟢 무조건 온라인</button>
        <button class="admin-btn" onclick="setManual('off')">🔴 무조건 점검중</button>
        <button class="admin-btn" onclick="closeAdmin()" style="background:#ff4444; border:none; margin-top:10px;">패널 닫기</button>
    </div>

    <div class="launcher-panel">
        <div class="tab-bar">
            <div class="tab active" onclick="openTab('intro')">소개</div>
            <div class="tab" onclick="openTab('rules')">규칙 및 접속법</div>
        </div>
        
        <div id="intro" class="content-area active intro-content">
            <h1>NEOCRAFT</h1>
            <div id="st-display" class="server-status">상태 확인 중...</div>
            <div class="address-group">
                <div class="address-btn"><span>접속 주소 1</span><span class="addr-val">neocraft.p-e.kr</span></div>
                <div class="address-btn"><span>접속 주소 2</span><span class="addr-val">sub.neocraft.p-e.kr</span></div>
                <div class="address-btn"><span>접속 주소 3</span><span class="addr-val">mc.neocraft.p-e.kr</span></div>
            </div>
        </div>

        <div id="rules" class="content-area">
            <div style="background:rgba(0,0,0,0.3); padding:20px; border-radius:4px; line-height:1.6;">
                <h2>서버 접속 규칙</h2>
                * 욕설 및 타인 비방 금지<br>
                * 타인의 아이템 절도 금지<br><br>
                <strong>[PC 주소]</strong> neocraft.p-e.kr<br>
                <strong>[모바일 주소]</strong> be.neocraft.p-e.kr (Port: 19132)
            </div>
        </div>

        <div class="play-bar">
            <button class="play-btn" onclick="alert('서버 주소를 복사해서 마크를 실행해줘!')">PLAY</button>
        </div>
    </div>

    <script>
        function openTab(id) {
            document.querySelectorAll('.content-area, .tab').forEach(el => el.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        let mode = localStorage.getItem('neo_mode') || 'auto';

        async function check() {
            const el = document.getElementById('st-display');
            
            // 수동 모드: "수동" 문구 삭제 🛫🐉💵
            if(mode === 'on') { ui(el, true, "🟢 서버가 온라인입니다!"); return; }
            if(mode === 'off') { ui(el, false, "🔴 현재 서버 점검 중입니다."); return; }

            try {
                const r = await fetch(`https://api.mcstatus.io/v2/status/java/neocraft.p-e.kr?t=${Date.now()}`);
                const d = await r.json();
                if (d.online) {
                    ui(el, true, `🟢 서버 온라인! (${d.players.online}/${d.players.max}명 접속 중)`);
                } else {
                    ui(el, false, "🔴 서버에 접속할 수 없습니다.");
                }
            } catch(e) { el.innerHTML = "🟡 상태 로드 실패"; }
        }

        function ui(el, on, txt) { el.innerHTML = txt; el.style.color = on ? '#36ff36' : '#ff4444'; }
        function setManual(m) { mode = m; localStorage.setItem('neo_mode', m); check(); alert("상태가 반영되었습니다!"); }
        function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }

        // 관리자 진입: 주소창 끝에 #admin 입력 🛫🐉💵
        function checkAdminAccess() {
            if(window.location.hash === '#admin') {
                document.getElementById('admin-panel').style.display = 'block';
            }
        }

        // 페이지 로드 시 및 주소 변경 시 체크
        window.addEventListener('hashchange', checkAdminAccess);
        checkAdminAccess();

        // 키보드 'admin' 입력 유지 (보조 수단) 🛫🐉💵
        let b = "";
        window.onkeydown = (e) => {
            b += e.key.toLowerCase();
            if(b.includes("admin")) { document.getElementById('admin-panel').style.display = 'block'; b = ""; }
            if(b.length > 10) b = "";
        }

        check();
        setInterval(check, 10000);
    </script>
</body>
</html>
