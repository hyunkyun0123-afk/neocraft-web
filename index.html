<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>NEOCRAFT</title>
    <style>
        body { margin: 0; background: #1e1e1e; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .panel { background: #2a2a2a; width: 90%; max-width: 600px; border-radius: 8px; border: 1px solid #555; overflow: hidden; position: relative; }
        .tabs { display: flex; background: #333; }
        .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; border-bottom: 3px solid transparent; }
        .tab.active { border-bottom-color: #36ff36; font-weight: bold; }
        .content { padding: 20px; display: none; max-height: 400px; overflow-y: auto; }
        .content.active { display: block; }
        .addr { background: #444; padding: 10px; margin: 5px 0; border-radius: 4px; display: flex; justify-content: space-between; }
        .green { color: #36ff36; }
        .red { color: #ff4444; }
        h2 { font-size: 18px; color: #36ff36; border-bottom: 1px solid #555; }

        /* 섭장 비밀 제어실 🛫🐉💵 */
        #admin-panel { display: none; position: absolute; top: 50px; right: 10px; background: #1e1e1e; padding: 15px; border-radius: 8px; border: 2px solid #36ff36; z-index: 100; width: 180px; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
        .admin-btn { width: 100%; margin-bottom: 5px; padding: 8px; background: #333; color: white; border: 1px solid #555; border-radius: 4px; cursor: pointer; font-size: 13px; }
        .admin-btn:hover { background: #444; }
    </style>
</head>
<body>
    <div id="admin-panel">
        <div style="font-size:12px; color:#36ff36; margin-bottom:10px; text-align:center;">섭장 제어실</div>
        <button class="admin-btn" onclick="setManual('auto')">🔄 실시간 자동모드</button>
        <button class="admin-btn" onclick="setManual('on')">🟢 강제 온라인</button>
        <button class="admin-btn" onclick="setManual('off')">🔴 강제 점검중</button>
        <button class="admin-btn" onclick="closeAdmin()" style="background:#ff4444; border:none; margin-top:5px;">닫기</button>
    </div>

    <div class="panel">
        <div class="tabs">
            <div id="t1" class="tab active" onclick="show(1)">소개</div>
            <div id="t2" class="tab" onclick="show(2)">규칙/접속</div>
        </div>
        <div id="c1" class="content active">
            <h1 style="text-align:center">NEOCRAFT</h1>
            <p id="st-msg" style="text-align:center" class="green">🟢 서버 상태 확인 중...</p>
            
            <div class="addr"><span>메인</span><span class="green">neocraft.p-e.kr</span></div>
            <div class="addr"><span>Azure</span><span class="green">sub.neocraft.p-e.kr</span></div>
            <div class="addr"><span>비상</span><span class="green">mc.neocraft.p-e.kr</span></div>
        </div>
        <div id="c2" class="content">
            <h2>서버 규칙</h2>
            <p>• 도둑질 금지 / 괴롭힘 금지<br>• 욕설 금지 / 핵 금지</p>
            <h2>접속 방법</h2>
            <b>[모바일]</b><br>BedrockTogether 앱 사용<br>주소: be.neocraft.p-e.kr (19132)<br><br>
            <b>[PC]</b><br>멀티플레이 -> 서버 추가<br>주소: neocraft.p-e.kr
        </div>
    </div>

    <script>
        function show(n){
            document.querySelectorAll('.tab, .content').forEach(el=>el.classList.remove('active'));
            document.getElementById('t'+n).classList.add('active');
            document.getElementById('c'+n).classList.add('active');
        }

        let mode = localStorage.getItem('neo_mode') || 'auto';

        async function updateStatus() {
            const msgEl = document.getElementById('st-msg');
            
            // 1. 수동 모드 체크 🛫🐉💵
            if(mode === 'on') { 
                msgEl.innerHTML = "🟢 1, 2, 3번 주소 모두 가동 중!"; 
                msgEl.className = "green"; return; 
            }
            if(mode === 'off') { 
                msgEl.innerHTML = "🔴 현재 점검 중입니다. 나중에 다시 오세요!"; 
                msgEl.className = "red"; return; 
            }

            // 2. 자동 모드 (진짜 데이터 가져오기) 🛫🐉💵
            try {
                // 캐시 방지를 위해 랜덤 쿼리 추가
                const r = await fetch(`https://api.mcstatus.io/v2/status/java/neocraft.p-e.kr?nocache=${Date.now()}`);
                const d = await r.json();
                
                if(d.online) {
                    // d.players.online이 진짜 현재 인원이야! 🛫🐉💵
                    msgEl.innerHTML = `🟢 서버 가동 중! (${d.players.online}/${d.players.max}명)`;
                    msgEl.className = "green";
                } else {
                    msgEl.innerHTML = "🔴 서버 점검 중 (네트워크 확인 필요)";
                    msgEl.className = "red";
                }
            } catch(e) { 
                msgEl.innerHTML = "🟡 서버 상태 로드 실패"; 
                msgEl.className = "";
            }
        }

        function setManual(m) { 
            mode = m; 
            localStorage.setItem('neo_mode', m); 
            updateStatus(); 
            alert("상태 적용 완료! (모드: " + m + ")"); 
        }
        
        function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }

        function checkAdmin() {
            if(window.location.hash === '#admin') {
                document.getElementById('admin-panel').style.display = 'block';
            }
        }

        window.onhashchange = checkAdmin;
        checkAdmin();
        updateStatus();
        setInterval(updateStatus, 10000); // 10초로 단축해서 더 빠르게 반영 🛫🐉💵
    </script>
</body>
</html>
